<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel | Banco Familiar</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/dashboard.html">Banco Familiar</a>
    <nav>
      <span id="user-name"></span>
      <a id="admin-link" class="button small secondary hidden" href="/admin.html">Banco</a>
      <button id="logout" class="button small ghost">Salir</button>
    </nav>
  </header>

  <main class="layout">
    <section class="panel balance-panel">
      <p class="eyebrow">Saldo disponible</p>
      <h1 id="balance">0</h1>
      <p class="muted">Dinero ficticio sin valor real.</p>
    </section>

    <section class="grid two">
      <article class="panel">
        <h2>Transferir</h2>
        <form id="transfer-form" class="form compact">
          <label>CI destino<input name="toCi" required></label>
          <label>Monto<input name="amount" type="number" min="1" step="1" required></label>
          <button class="button primary" type="submit">Enviar</button>
        </form>
      </article>

      <article class="panel">
        <h2>Solicitar prestamo</h2>
        <form id="loan-form" class="form compact">
          <label>Monto<input name="amount" type="number" min="1" step="1" required></label>
          <button class="button primary" type="submit">Solicitar</button>
        </form>
      </article>
    </section>

    <section class="grid three">
      <article class="panel">
        <h2>Notificaciones</h2>
        <div id="notifications" class="list"></div>
      </article>
      <article class="panel">
        <h2>Prestamos</h2>
        <div id="loans" class="list"></div>
      </article>
      <article class="panel">
        <h2>Historial</h2>
        <div id="transactions" class="list"></div>
      </article>
    </section>
    <p id="message" class="message"></p>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
